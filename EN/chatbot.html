<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chat for Sellers — ShopIA</title>
<meta name="description" content="Free AI assistant specialized in ecommerce. Product strategy, Amazon FBA, Shopify, Etsy and advertising. No signup, no limits.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://www.shopiatools.com/en/chatbot.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
<script defer data-domain="shopiatools.com" src="https://analytics.digiprompts.io/js/script.js"></script>
<style>
:root{
  --ink:#0D0F14;--ink2:#161923;--ink3:#1E2430;
  --wall:#232C3A;--wall2:#2A3545;
  --mist:#C8D4E8;--mist2:#7A8FAA;--mist3:#3D5070;
  --accent:#5BBFFF;--accent-bg:rgba(91,191,255,0.06);--accent-bd:rgba(91,191,255,0.18);
  --gold:#FFD166;--gold-bg:rgba(255,209,102,0.06);
  --coral:#FF7A5A;
  --display:'Fraunces',Georgia,serif;
  --body:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--body);background:var(--ink);color:var(--mist);line-height:1.6}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px}

nav{position:relative;z-index:200;background:rgba(13,15,20,0.96);backdrop-filter:blur(24px);border-bottom:1px solid var(--wall);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nav-logo{font-family:var(--display);font-size:22px;font-weight:900;color:var(--mist);text-decoration:none;letter-spacing:-0.5px}
.nav-logo em{color:var(--accent);font-style:italic}
.nav-links{display:flex;gap:4px;list-style:none}
.nav-links a{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--mist2);text-decoration:none;padding:7px 14px;border-radius:6px;transition:all 0.2s}
.nav-links a:hover,.nav-links a.active{color:var(--accent);background:var(--accent-bg)}
.btn-nav{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;border-radius:6px;text-decoration:none;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bd);transition:all 0.2s}
.btn-nav:hover{background:var(--accent);color:var(--ink)}
.lang-switcher{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--mist3);text-decoration:none;padding:6px 12px;border-radius:6px;border:1px solid var(--wall);transition:all 0.2s}
.lang-switcher:hover{color:var(--mist);border-color:var(--wall2)}

.app{display:flex;height:calc(100vh - 64px);position:relative;z-index:1}

/* SIDEBAR */
.sidebar{width:260px;flex-shrink:0;background:var(--ink2);border-right:1px solid var(--wall);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:20px 16px 12px;border-bottom:1px solid var(--wall)}
.sb-title{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--mist3);margin-bottom:12px}
.new-chat{width:100%;padding:10px 14px;background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:8px;color:var(--accent);font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.new-chat:hover{background:var(--accent);color:var(--ink)}
.prompts-section{flex:1;overflow-y:auto;padding:16px}
.prompts-section::-webkit-scrollbar{width:4px}
.prompts-section::-webkit-scrollbar-thumb{background:var(--wall2);border-radius:2px}
.pg-title{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--mist3);margin-bottom:8px;margin-top:16px}
.pg-title:first-child{margin-top:0}
.qp{width:100%;text-align:left;padding:8px 10px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--mist2);font-family:var(--body);font-size:12px;cursor:pointer;transition:all 0.15s;line-height:1.4;display:flex;align-items:flex-start;gap:8px}
.qp:hover{background:var(--ink3);border-color:var(--wall);color:var(--mist)}
.qp-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.sb-foot{padding:12px 16px;border-top:1px solid var(--wall)}
.nl-mini{display:flex;align-items:center;gap:10px;padding:10px 12px;background:linear-gradient(135deg,var(--accent-bg),var(--gold-bg));border:1px solid var(--wall2);border-radius:8px;text-decoration:none;transition:all 0.2s}
.nl-mini:hover{border-color:var(--accent-bd)}
.nm-ico{font-size:18px}
.nm-name{font-size:12px;font-weight:600;color:var(--mist)}
.nm-sub{font-size:10px;color:var(--mist3)}
.nm-arr{font-size:12px;color:var(--accent);margin-left:auto}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0}
.ctx-bar{padding:10px 20px;border-bottom:1px solid var(--wall);display:flex;gap:6px;flex-wrap:wrap;background:var(--ink2)}
.ctx-chip{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:100px;cursor:pointer;border:1px solid var(--wall);background:transparent;color:var(--mist3);transition:all 0.15s}
.ctx-chip:hover,.ctx-chip.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--wall2);border-radius:2px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px 20px}
.w-icon{font-size:48px;margin-bottom:20px}
.w-title{font-family:var(--display);font-size:28px;font-weight:900;letter-spacing:-0.8px;color:var(--mist);margin-bottom:10px}
.w-title em{color:var(--accent);font-style:italic}
.w-desc{font-size:15px;color:var(--mist2);max-width:460px;line-height:1.7;margin-bottom:32px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:580px}
.chip{padding:8px 14px;background:var(--ink3);border:1px solid var(--wall2);border-radius:100px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.5px;color:var(--mist2);cursor:pointer;transition:all 0.2s}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.msg{display:flex;gap:12px;max-width:800px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg-av{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.assistant .msg-av{background:linear-gradient(135deg,var(--accent-bg),var(--gold-bg));border:1px solid var(--accent-bd)}
.msg.user .msg-av{background:var(--ink3);border:1px solid var(--wall)}
.msg-content{flex:1;min-width:0}
.msg-name{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--mist3);margin-bottom:5px}
.msg.user .msg-name{text-align:right}
.msg-bubble{padding:14px 18px;border-radius:10px;font-size:14px;line-height:1.7}
.msg.assistant .msg-bubble{background:var(--ink2);border:1px solid var(--wall);color:var(--mist);border-radius:2px 10px 10px 10px}
.msg.user .msg-bubble{background:var(--accent);color:var(--ink);border-radius:10px 2px 10px 10px;font-weight:500}
.msg-actions{display:flex;gap:6px;margin-top:6px}
.act-btn{font-family:var(--mono);font-size:8px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:1px solid var(--wall);background:transparent;color:var(--mist3);cursor:pointer;transition:all 0.15s}
.act-btn:hover{border-color:var(--accent);color:var(--accent)}
.typing{display:flex;gap:4px;padding:14px 18px;background:var(--ink2);border:1px solid var(--wall);border-radius:2px 10px 10px 10px;width:fit-content}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--mist3);animation:typ 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes typ{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.err-bubble{padding:12px 16px;background:rgba(255,122,90,0.08);border:1px solid rgba(255,122,90,0.25);border-radius:8px;font-size:13px;color:var(--coral)}
.input-area{padding:16px 20px;border-top:1px solid var(--wall);background:var(--ink2)}
.input-row{display:flex;gap:10px;align-items:flex-end;background:var(--ink3);border:1px solid var(--wall);border-radius:12px;padding:10px 14px;transition:border-color 0.2s}
.input-row:focus-within{border-color:var(--accent-bd)}
textarea#user-input{flex:1;background:transparent;border:none;outline:none;resize:none;color:var(--mist);font-family:var(--body);font-size:14px;line-height:1.5;max-height:160px}
textarea#user-input::placeholder{color:var(--mist3)}
#send-btn{width:36px;height:36px;border-radius:8px;background:var(--accent);color:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;flex-shrink:0;font-weight:700}
#send-btn:hover{opacity:0.88}
#send-btn:disabled{opacity:0.5;cursor:not-allowed}

@media(max-width:768px){
  nav{padding:0 20px}
  .nav-links,.btn-nav,.lang-switcher{display:none}
  .sidebar{display:none}
  .input-area{padding:12px}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Shop<em>IA</em></a>
  <ul class="nav-links">
    <li><a href="tools.html">Tools</a></li>
    <li><a href="chatbot.html" class="active">AI Chat ✦</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="subscribe.html">Newsletter</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="../chatbot.html" class="lang-switcher">🇪🇸 ES</a>
    <a href="subscribe.html" class="btn-nav">1,000 free prompts →</a>
  </div>
</nav>

<div class="app">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">Conversations</div>
      <button class="new-chat" onclick="newChat()">✦ New conversation</button>
    </div>
    <div class="prompts-section">
      <div class="pg-title">Amazon</div>
      <button class="qp" data-prompt="How do I validate if a product has demand on Amazon?"><span class="qp-ico">🔍</span>Validate product demand</button>
      <button class="qp" data-prompt="How do I find the best keywords for my Amazon listing?"><span class="qp-ico">🔑</span>Keywords for my listing</button>
      <button class="qp" data-prompt="How to get my first Amazon reviews ethically?"><span class="qp-ico">⭐</span>Get first reviews</button>
      <button class="qp" data-prompt="Explain Amazon FBA vs FBM and which is better for a beginner"><span class="qp-ico">📦</span>FBA vs FBM comparison</button>

      <div class="pg-title">Shopify</div>
      <button class="qp" data-prompt="Give me a 30-day strategy to launch my first Shopify store"><span class="qp-ico">🚀</span>Launch Shopify strategy</button>
      <button class="qp" data-prompt="What are the best Shopify apps to increase conversion rate?"><span class="qp-ico">📈</span>Best apps for Shopify</button>
      <button class="qp" data-prompt="How to drive traffic to a new Shopify store with no budget?"><span class="qp-ico">📣</span>Free traffic for Shopify</button>

      <div class="pg-title">Etsy & POD</div>
      <button class="qp" data-prompt="How to rank my Etsy shop when there's a lot of competition?"><span class="qp-ico">🎨</span>Position in Etsy</button>
      <button class="qp" data-prompt="What print-on-demand products sell best on Etsy in 2026?"><span class="qp-ico">🖨️</span>Best POD products 2026</button>

      <div class="pg-title">Strategy</div>
      <button class="qp" data-prompt="What ecommerce niches are growing in 2026?"><span class="qp-ico">📊</span>Growing niches 2026</button>
      <button class="qp" data-prompt="How to price my products competitively while staying profitable?"><span class="qp-ico">💰</span>Pricing strategy</button>
    </div>
    <div class="sb-foot">
      <a href="subscribe.html" class="nl-mini">
        <span class="nm-ico">🎁</span>
        <div><div class="nm-name">1,000 Free Prompts</div><div class="nm-sub">Amazon · Shopify · Etsy</div></div>
        <span class="nm-arr">→</span>
      </a>
    </div>
  </div>

  <div class="chat-area">
    <div class="ctx-bar">
      <button class="ctx-chip active" data-ctx="seller" onclick="toggleCtx(this)">🛒 Seller</button>
      <button class="ctx-chip" data-ctx="amazon" onclick="toggleCtx(this)">📦 Amazon</button>
      <button class="ctx-chip" data-ctx="shopify" onclick="toggleCtx(this)">🛍️ Shopify</button>
      <button class="ctx-chip" data-ctx="etsy" onclick="toggleCtx(this)">🎨 Etsy</button>
      <button class="ctx-chip" data-ctx="ads" onclick="toggleCtx(this)">📱 Ads</button>
    </div>
    <div class="messages" id="messages">
      <!-- Welcome screen injected by JS -->
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="user-input" rows="1" placeholder="Ask anything about ecommerce..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()">▶</button>
      </div>
    </div>
  </div>
</div>

<script>
var PROXY_URL = '[API-ORACLE-URL]'; // Replace with your proxy endpoint — same as tools.html

var SYSTEMS = {
  seller: 'You are an expert ecommerce advisor specialized in helping online sellers grow their businesses. You have deep knowledge of Amazon FBA, Shopify, Etsy, Facebook Ads, SEO, product sourcing, pricing strategy, and ecommerce operations. Give specific, actionable advice. Respond in English.',
  amazon: 'You are an Amazon FBA expert with extensive knowledge of the A9/A10 algorithm, listing optimization, PPC advertising, product research, Seller Central operations, and Amazon policies. You help sellers rank higher, convert better, and scale profitably. Respond in English.',
  shopify: 'You are a Shopify specialist who helps entrepreneurs build and scale successful stores. You know Shopify apps, conversion rate optimization, Facebook/Google ads for DTC brands, email marketing, and the full Shopify ecosystem. Respond in English.',
  etsy: 'You are an Etsy expert specializing in print-on-demand, handmade products, and artisan sales. You know Etsy SEO deeply, thumbnail optimization, competitive pricing, and how to scale artisan shops. Respond in English.',
  ads: 'You are a paid advertising expert for ecommerce: Facebook/Meta Ads, Google Shopping, TikTok Ads and Amazon PPC. You specialize in profitable campaign structures, ROAS optimization, and scaling ad budgets efficiently. Respond in English.'
};

var chatHistory=[];var activeCtx='seller';var isProcessing=false;

function toggleCtx(el){document.querySelectorAll('.ctx-chip').forEach(function(c){c.classList.remove('active');});el.classList.add('active');activeCtx=el.dataset.ctx;}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function newChat(){chatHistory=[];document.getElementById('messages').innerHTML=getWelcomeHTML();attachChips();}

function getWelcomeHTML(){
  return '<div class="welcome" id="welcome-screen"><div class="w-icon">🛒</div><h2 class="w-title">Shop<em>IA</em> Chat</h2><p class="w-desc">Your AI assistant specialized in ecommerce. Amazon, Shopify, Etsy, advertising and product strategy.</p><div class="chips" id="chips-container"><div class="chip" data-prompt="How do I validate if a product has demand on Amazon?">🔍 Validate product on Amazon</div><div class="chip" data-prompt="Give me a 30-day strategy to launch my first Shopify store">🚀 Launch a Shopify store</div><div class="chip" data-prompt="How to rank my Etsy shop when there\'s a lot of competition?">🎨 Rank on Etsy</div><div class="chip" data-prompt="What ecommerce niches are growing in 2026?">📈 Growing niches 2026</div></div></div>';
}

function attachChips(){
  document.querySelectorAll('.chip[data-prompt]').forEach(function(c){
    c.addEventListener('click',function(){document.getElementById('user-input').value=this.dataset.prompt;sendMessage();});
  });
  document.querySelectorAll('.qp[data-prompt]').forEach(function(b){
    b.addEventListener('click',function(){document.getElementById('user-input').value=this.dataset.prompt;sendMessage();});
  });
}

function sendMessage(){
  if(isProcessing)return;
  var input=document.getElementById('user-input');
  var userText=input.value.trim();
  if(!userText)return;
  var welcome=document.getElementById('welcome-screen');
  if(welcome)welcome.remove();
  appendMsg('user',userText);
  input.value='';input.style.height='auto';
  chatHistory.push({role:'user',content:userText});
  isProcessing=true;
  var btn=document.getElementById('send-btn');btn.disabled=true;btn.textContent='⏳';
  var typId=appendTyping();
  fetch(PROXY_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:SYSTEMS[activeCtx],messages:chatHistory})
  })
  .then(function(r){
    removeTyping(typId);
    if(!r.ok)throw new Error(r.status===429?'Limit reached. Please wait a moment.':'Connection error with the server.');
    return r.json();
  })
  .then(function(d){
    var reply=d.reply||'';
    if(!reply)throw new Error('Empty response from server.');
    chatHistory.push({role:'assistant',content:reply});
    appendMsg('assistant',reply);
  })
  .catch(function(e){removeTyping(typId);appendErr(e.message);})
  .finally(function(){isProcessing=false;btn.disabled=false;btn.textContent='▶';});
}

function appendMsg(role,text){
  var msgs=document.getElementById('messages');
  var w=document.createElement('div');w.className='msg '+role;
  var av=document.createElement('div');av.className='msg-av';av.textContent=role==='user'?'👤':'🛒';
  var c=document.createElement('div');c.className='msg-content';
  var n=document.createElement('div');n.className='msg-name';n.textContent=role==='user'?'You':'ShopIA AI';
  var b=document.createElement('div');b.className='msg-bubble';
  b.innerHTML=formatText(text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  c.appendChild(n);c.appendChild(b);
  if(role==='assistant'){
    var acts=document.createElement('div');acts.className='msg-actions';
    var cpBtn=document.createElement('button');cpBtn.className='act-btn';cpBtn.textContent='Copy';
    var ct=text;
    cpBtn.addEventListener('click',function(){navigator.clipboard.writeText(ct).then(function(){cpBtn.textContent='✓ Copied';setTimeout(function(){cpBtn.textContent='Copy';},2000);});});
    acts.appendChild(cpBtn);c.appendChild(acts);
  }
  w.appendChild(av);w.appendChild(c);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;
}

function appendTyping(){
  var msgs=document.getElementById('messages');
  var id='ty_'+Date.now();
  var d=document.createElement('div');d.className='msg assistant';d.id=id;
  d.innerHTML='<div class="msg-av">🛒</div><div class="msg-content"><div class="msg-name">ShopIA AI</div><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return id;
}
function removeTyping(id){var el=document.getElementById(id);if(el)el.remove();}
function appendErr(msg){
  var msgs=document.getElementById('messages');
  var d=document.createElement('div');d.className='msg assistant';
  d.innerHTML='<div class="msg-av">🛒</div><div class="msg-content"><div class="msg-name">ShopIA AI</div><div class="err-bubble">⚠️ '+msg+'<br><small style="opacity:0.7">Configure PROXY_URL with your Oracle endpoint.</small></div></div>';
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}

function formatText(t){
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/### (.+)/g,'<h4 style="color:var(--accent);margin:10px 0 5px;font-family:var(--display);font-size:14px;">$1</h4>');
  t=t.replace(/## (.+)/g,'<h3 style="color:var(--accent);margin:12px 0 6px;font-family:var(--display);">$1</h3>');
  t=t.replace(/^- (.+)$/gm,'<li style="margin-bottom:3px;padding-left:8px;">$1</li>');
  t=t.replace(/\n\n/g,'</p><p style="margin-bottom:8px;">');
  t=t.replace(/\n/g,'<br>');
  return '<p style="margin-bottom:8px;">'+t+'</p>';
}

window.addEventListener('load',function(){
  document.getElementById('messages').innerHTML=getWelcomeHTML();
  attachChips();
});
</script>
</body>
</html>
